name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Linux — cross-compile from x86_64 Ubuntu; sqlite3 needs CGO + proper cross-CC
          - { goos: linux,   goarch: amd64, runs-on: ubuntu-latest, cc: "" }
          - { goos: linux,   goarch: arm64, runs-on: ubuntu-latest, cc: aarch64-linux-gnu-gcc }

          # macOS — use native runners so CGO compiles without cross-toolchain
          # macos-13 = x86_64 Intel;  macos-latest (14+) = Apple Silicon arm64
          - { goos: darwin,  goarch: amd64, runs-on: macos-13,      cc: "" }
          - { goos: darwin,  goarch: arm64, runs-on: macos-latest,  cc: "" }

          # Windows — cross-compile via mingw-w64
          - { goos: windows, goarch: amd64, runs-on: ubuntu-latest, cc: x86_64-w64-mingw32-gcc }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install cross-compilers (Linux runner only)
        if: matrix.runs-on == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          pkgs=""
          [ "${{ matrix.goarch }}" = "arm64" ] && [ "${{ matrix.goos }}" = "linux" ] && pkgs="$pkgs gcc-aarch64-linux-gnu"
          [ "${{ matrix.goos }}" = "windows" ] && pkgs="$pkgs mingw-w64"
          [ -n "$pkgs" ] && sudo apt-get install -y $pkgs || true

      - name: Build binaries
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC:          ${{ matrix.cc }}
        run: |
          mkdir -p dist
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          TAG="${GITHUB_REF_NAME}"

          go build \
            -ldflags="-s -w -X main.version=${TAG}" \
            -o "dist/cipher-shield-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" \
            ./cmd/shield/

          # Server binary: Linux only (other platforms deploy via Docker)
          if [ "${{ matrix.goos }}" = "linux" ]; then
            go build \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o "dist/shield-server-${{ matrix.goos }}-${{ matrix.goarch }}" \
              ./cmd/server/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
          generate_release_notes: true
