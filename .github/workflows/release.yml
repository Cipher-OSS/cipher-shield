name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/cipher-shield-linux-amd64   ./cmd/shield/
          GOOS=linux   GOARCH=arm64 go build -o dist/cipher-shield-linux-arm64   ./cmd/shield/
          GOOS=darwin  GOARCH=amd64 go build -o dist/cipher-shield-darwin-amd64  ./cmd/shield/
          GOOS=darwin  GOARCH=arm64 go build -o dist/cipher-shield-darwin-arm64  ./cmd/shield/
          GOOS=windows GOARCH=amd64 go build -o dist/cipher-shield-windows-amd64.exe ./cmd/shield/
          GOOS=linux   GOARCH=amd64 go build -o dist/shield-server-linux-amd64   ./cmd/server/
          GOOS=linux   GOARCH=arm64 go build -o dist/shield-server-linux-arm64   ./cmd/server/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
