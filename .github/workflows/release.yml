name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runs-on: ubuntu-latest,  cc: "" }
          - { goos: linux,   goarch: arm64, runs-on: ubuntu-latest,  cc: aarch64-linux-gnu-gcc }
          - { goos: darwin,  goarch: amd64, runs-on: macos-latest,   cc: "" }
          - { goos: darwin,  goarch: arm64, runs-on: macos-latest,   cc: "" }
          - { goos: windows, goarch: amd64, runs-on: ubuntu-latest,  cc: x86_64-w64-mingw32-gcc }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install cross-compilers (Linux runner only)
        if: matrix.runs-on == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          pkgs=""
          [ "${{ matrix.goarch }}" = "arm64" ] && pkgs="$pkgs gcc-aarch64-linux-gnu"
          [ "${{ matrix.goos }}" = "windows" ] && pkgs="$pkgs mingw-w64"
          [ -n "$pkgs" ] && sudo apt-get install -y $pkgs

      - name: Build binaries
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC:          ${{ matrix.cc }}
        run: |
          mkdir -p dist
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"

          go build -ldflags="-s -w" \
            -o dist/cipher-shield-${{ matrix.goos }}-${{ matrix.goarch }}${ext} \
            ./cmd/shield/

          # Server binary: Linux only (runs in Docker on other platforms)
          if [ "${{ matrix.goos }}" = "linux" ]; then
            go build -ldflags="-s -w" \
              -o dist/shield-server-${{ matrix.goos }}-${{ matrix.goarch }} \
              ./cmd/server/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
